{{- if .Values.query.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-query
  namespace: {{ .Values.namespace }}
  labels:
    app: vllm-query
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-query
  template:
    metadata:
      labels:
        app: vllm-query
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      enableServiceLinks: false
      runtimeClassName: nvidia
      containers:
        - name: vllm
          image: {{ .Values.query.image }}
          args:
            - {{ .Values.query.modelPath }}
            - --tokenizer
            - {{ .Values.query.tokenizer }}
            - --dtype
            - {{ .Values.query.dtype }}
            - --host
            - "0.0.0.0"
            - --port
            - {{ .Values.query.port | quote }}
            - --served-model-name
            - {{ .Values.query.servedModelName }}
            - --max-model-len
            - {{ .Values.query.maxModelLen | quote }}
            - --max-num-seqs
            - {{ .Values.query.maxNumSeqs | quote }}
            - --gpu-memory-utilization
            - {{ .Values.query.gpuMemoryUtilization | quote }}
            - --enable-prefix-caching
            - --trust-remote-code
            - --chat-template
            - /etc/vllm/chat_template.jinja
          env:
            - name: CUDA_MPS_PIPE_DIRECTORY
              value: "/run/nvidia/mps/nvidia.com/gpu/pipe"
            - name: CUDA_MPS_LOG_DIRECTORY
              value: "/run/nvidia/mps/nvidia.com/gpu/log"
          ports:
            - containerPort: {{ .Values.query.port }}
              name: http
          resources:
            {{- toYaml .Values.query.resources | nindent 12 }}
          volumeMounts:
            - name: model-data
              mountPath: /data
              readOnly: true
            - name: mps-root
              mountPath: /run/nvidia/mps
            - name: mps-shm
              mountPath: /dev/shm
            - name: chat-template
              mountPath: /etc/vllm
              readOnly: true
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.query.port }}
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.query.port }}
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: model-data
          persistentVolumeClaim:
            claimName: {{ .Values.query.pvc }}
        - name: mps-root
          hostPath:
            path: /run/nvidia/mps
            type: Directory
        - name: mps-shm
          hostPath:
            path: /run/nvidia/mps/shm
            type: Directory
        - name: chat-template
          configMap:
            name: vllm-extract-chat-template
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-query
  namespace: {{ .Values.namespace }}
  labels:
    app: vllm-query
spec:
  selector:
    app: vllm-query
  ports:
    - port: {{ .Values.query.port }}
      targetPort: {{ .Values.query.port }}
      name: http
{{- end }}
