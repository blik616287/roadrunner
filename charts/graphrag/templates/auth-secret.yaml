{{- if .Values.auth.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: auth-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  GOOGLE_CLIENT_ID: {{ .Values.auth.googleClientId | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.auth.googleClientSecret | quote }}
  AUTH_SESSION_SECRET: {{ .Values.auth.sessionSecret | quote }}
{{- end }}
