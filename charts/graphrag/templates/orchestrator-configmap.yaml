{{- if .Values.orchestrator.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: orchestrator-config
  namespace: {{ .Values.namespace }}
data:
  # NATS
  NATS_URL: "nats://nats.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.nats.clientPort }}"
  # Redis
  REDIS_URL: "redis://redis.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.redis.port }}/0"
  SESSION_TTL_SECONDS: {{ .Values.orchestrator.sessionTtlSeconds | default "7200" | quote }}
  # PostgreSQL
  PG_HOST: "postgresql.{{ .Values.namespace }}.svc.cluster.local"
  PG_PORT: {{ .Values.postgresql.port | quote }}
  PG_USER: {{ .Values.postgresql.auth.username }}
  PG_PASSWORD: {{ .Values.postgresql.auth.password }}
  PG_DATABASE: {{ .Values.postgresql.auth.database }}
  # LightRAG
  LIGHTRAG_URL: "http://lightrag.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.lightrag.port }}"
  # Code Preprocessor
  PREPROCESSOR_URL: "http://code-preprocessor.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.codePreprocessor.port }}"
  # Embedding (conditional on mode)
  {{- if eq (.Values.embedding.mode | default "dedicated") "unified" }}
  EMBED_URL: "http://vllm-extract.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.extraction.port }}"
  EMBED_MODEL: {{ .Values.extraction.servedModelName | quote }}
  EMBED_DIM: "4096"
  {{- else }}
  EMBED_URL: "http://vllm-embed.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.embedding.port }}"
  EMBED_MODEL: {{ .Values.embedding.model | quote }}
  EMBED_DIM: {{ .Values.lightrag.embeddingConfig.dim | quote }}
  {{- end }}
  EMBEDDING_MODE: {{ .Values.embedding.mode | default "dedicated" | quote }}
  # Reranker (for data query health checks)
  RERANKER_URL: {{ .Values.orchestrator.rerankerUrl | quote }}
  # Query activity tracking (Redis TTL for burst mode coordination)
  QUERY_ACTIVITY_KEY: {{ .Values.orchestrator.queryActivityKey | quote }}
  QUERY_ACTIVITY_TTL: {{ .Values.orchestrator.queryActivityTtl | default "120" | quote }}
  # Summarizer (uses vllm-extract via OpenAI-compatible API)
  SUMMARIZER_URL: "http://vllm-extract.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.extraction.port }}/v1"
  SUMMARIZER_MODEL: {{ .Values.extraction.servedModelName | quote }}
  # Query LLM (dedicated vllm-query for explain/synthesis)
  {{- if .Values.query.enabled }}
  QUERY_LLM_URL: "http://vllm-query.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.query.port }}/v1"
  QUERY_LLM_MODEL: {{ .Values.query.servedModelName | quote }}
  {{- end }}
  # Neo4j
  NEO4J_URI: "bolt://neo4j.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.neo4j.boltPort }}"
  NEO4J_USER: {{ .Values.neo4j.auth.username | quote }}
  NEO4J_PASSWORD: {{ .Values.neo4j.auth.password | quote }}
  # Memory thresholds
  PROMOTE_AFTER_TURNS: {{ .Values.orchestrator.promoteAfterTurns | default "10" | quote }}
  ARCHIVAL_AFTER_TURNS: {{ .Values.orchestrator.archivalAfterTurns | default "20" | quote }}
  RECALL_TOP_K: {{ .Values.orchestrator.recallTopK | default "3" | quote }}
  ARCHIVAL_TOP_K: {{ .Values.orchestrator.archivalTopK | default "3" | quote }}
{{- end }}
