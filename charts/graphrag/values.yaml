namespace: graphrag

# -- Embedding model served by vLLM (pooling runner, continuous batching)
embedding:
  enabled: true
  mode: "dedicated"    # "dedicated" (vllm-embed) or "unified" (use vllm-extract for embedding)
  image: vllm/vllm-openai:nightly-aarch64
  model: "Qwen/Qwen3-Embedding-0.6B"
  port: 8000
  pvc: vllm-embed-data
  maxModelLen: "8192"
  gpuMemoryUtilization: "0.03"

  persistence:
    storageClass: longhorn-models
    size: 5Gi
  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "4"
      memory: 8Gi
      nvidia.com/gpu: "1"

# -- Extraction LLM served by vLLM (Q4_K_M GGUF, continuous batching)
extraction:
  enabled: true
  image: vllm/vllm-openai:nightly-aarch64
  model: "Qwen3-30B-A3B-Instruct-2507"
  modelPath: "/data/Qwen3-30B-A3B-Instruct-2507-Q4_K_M.gguf"
  tokenizer: "/data/tokenizer"
  dtype: "half"
  servedModelName: "qwen3-30b-a3b-extract"
  pvc: "model-qwen3-30b-a3b"
  port: 8000
  maxModelLen: "16384"
  maxNumSeqs: "16"
  gpuMemoryUtilization: "0.50"

  persistence:
    storageClass: longhorn-models
    size: 25Gi
  resources:
    requests:
      cpu: "2"
      memory: 16Gi
    limits:
      cpu: "8"
      memory: 32Gi
      nvidia.com/gpu: "1"

# -- Query LLM served by vLLM (GPU) — disabled in favor of cpu-query
query:
  enabled: false
  image: vllm/vllm-openai:nightly-aarch64
  model: "Qwen3-30B-A3B-Instruct-2507"
  modelPath: "/data/Qwen3-30B-A3B-Instruct-2507-Q4_K_M.gguf"
  tokenizer: "/data/tokenizer"
  dtype: "half"
  servedModelName: "qwen3-30b-a3b-query"
  pvc: "model-qwen3-30b-a3b"
  port: 8000
  maxModelLen: "8192"
  maxNumSeqs: "2"
  gpuMemoryUtilization: "0.17"
  resources:
    requests:
      cpu: "2"
      memory: 16Gi
    limits:
      cpu: "8"
      memory: 32Gi
      nvidia.com/gpu: "1"

# -- Reranker model served by vLLM (GPU) — disabled in favor of cpu-rerank
reranker:
  enabled: false
  image: vllm/vllm-openai:nightly-aarch64
  model: "BAAI/bge-reranker-v2-m3"
  port: 8000
  persistence:
    storageClass: longhorn-models
    size: 5Gi
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 8Gi
      nvidia.com/gpu: "1"

# -- CPU Query LLM (llama-cpp-python, Qwen3-4B Q4_K_M)
cpuQuery:
  enabled: true
  image: localhost/graphrag-cpu-query:latest
  modelPath: "/data/Qwen3-4B-Q4_K_M.gguf"
  pvc: "model-qwen3-4b"
  nCtx: "8192"
  nThreads: "8"
  nBatch: "512"
  persistence:
    storageClass: longhorn-models
    size: 5Gi
  resources:
    requests:
      cpu: "4"
      memory: 4Gi
    limits:
      cpu: "10"
      memory: 8Gi

# -- CPU Reranker (sentence-transformers, bge-reranker-v2-m3)
cpuRerank:
  enabled: true
  image: localhost/graphrag-cpu-rerank:latest
  pvc: "vllm-rerank-data"
  resources:
    requests:
      cpu: "2"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 4Gi

# -- LightRAG application server
lightrag:
  enabled: true
  image: localhost/graphrag-lightrag:v2
  port: 9621
  nodePort: 31436
  # LLM for entity extraction -- points to vllm-extract (OpenAI-compatible)
  llm:
    binding: openai
    model: "qwen3-30b-a3b-extract"
    host: "http://vllm-extract:8000/v1"
    numCtx: "16384"
  # Embedding -- points to vllm-embed (pooling runner)
  embeddingConfig:
    binding: openai
    model: "Qwen/Qwen3-Embedding-0.6B"
    dim: "1024"
    host: "http://vllm-embed:8000/v1"
  # Reranker -- points to vllm-rerank
  rerank:
    enabled: true
    binding: cohere
    model: "BAAI/bge-reranker-v2-m3"
    host: "http://vllm-rerank:8000/rerank"
  llmTimeout: "600"            # LLM worker timeout in seconds (default 180, increase for larger models)
  maxAsync: "16"                # concurrent document processing (default 8)
  maxParallelInsert: "8"        # concurrent database inserts (default 4)
  # Embedding throughput tuning
  embeddingBatchNum: "32"      # chunks per embedding call (default 10)
  embeddingFuncMaxAsync: "4"   # concurrent embedding calls (default 8)
  embeddingTimeout: "60"       # embedding timeout in seconds (default 30)
  # Chunking
  chunkSize: "4000"            # tokens per LightRAG internal chunk (default 1200)
  chunkOverlapSize: "100"      # token overlap between chunks
  # Pipelined embedding + extraction (workspace_patch.py)
  pipelinedEmbedding: "1"     # 1=overlap embedding with extraction, 0=sequential
  # Extraction optimization patches (workspace_patch.py)
  filetypePrompts: "1"         # 1=per-file-type extraction prompts, 0=default generic
  llmMaxTokens: "512"          # max_tokens cap for LLM extraction calls (0=unlimited)
  typedRelationships: "1"      # 1=use extraction keywords as Neo4j relationship types, 0=all DIRECTED
  # Streaming pipeline (workspace_patch.py)
  hotPipeline: "1"             # 1=streaming background worker, 0=legacy batch-per-request
  hotPipelineWorkers: "16"     # concurrent doc processing slots in streaming mode
  # Storage backends
  storage:
    graph: Neo4JStorage
    vector: PGVectorStorage
    kv: PGKVStorage
    docStatus: PGDocStatusStorage
  persistence:
    storageClass: longhorn
    size: 10Gi
  resources:
    requests:
      cpu: "1"
      memory: 512Mi
    limits:
      cpu: "4"
      memory: 4Gi

# -- Neo4j Community Edition
neo4j:
  enabled: true
  image: neo4j:community
  httpPort: 7474
  boltPort: 7687
  nodePort: 31474
  auth:
    username: neo4j
    password: "graphrag-local-2024"
  jvm:
    heapInitial: "1g"
    heapMax: "4g"
    pagecache: "1g"
  persistence:
    storageClass: longhorn
    size: 20Gi
  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "4"
      memory: 8Gi

# -- PostgreSQL with pgvector
postgresql:
  enabled: true
  image: pgvector/pgvector:pg17
  port: 5432
  auth:
    username: lightrag
    password: "graphrag-local-2024"
    database: lightrag
  persistence:
    storageClass: longhorn
    size: 20Gi
  resources:
    requests:
      cpu: "0.5"
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 2Gi

# -- Code preprocessor (tree-sitter)
codePreprocessor:
  enabled: true
  image: localhost/graphrag-code-preprocessor:v3
  port: 8090
  nodePort: 31490
  replicas: 2
  resources:
    requests:
      cpu: "1"
      memory: 512Mi
    limits:
      cpu: "4"
      memory: 4Gi

# -- Redis (working memory for orchestrator)
redis:
  enabled: true
  image: redis:7-alpine
  port: 6379
  maxmemory: "256mb"
  persistence:
    storageClass: longhorn
    size: 1Gi
  resources:
    requests:
      cpu: "0.1"
      memory: 64Mi
    limits:
      cpu: "1"
      memory: 512Mi

# -- GraphRAG Orchestrator (ingestion API + data query)
orchestrator:
  enabled: true
  image: localhost/graphrag-orchestrator:v6
  port: 8100
  nodePort: 31800
  sessionTtlSeconds: "7200"
  rerankerUrl: "http://vllm-rerank:8000"
  queryActivityKey: "graphrag:query_active"
  queryActivityTtl: "120"
  promoteAfterTurns: "10"
  archivalAfterTurns: "20"
  recallTopK: "3"
  archivalTopK: "3"
  resources:
    requests:
      cpu: "0.5"
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1Gi

# -- NATS with JetStream (message queue for ingestion)
nats:
  enabled: true
  image: nats:2-alpine
  clientPort: 4222
  monitorPort: 8222
  persistence:
    storageClass: longhorn
    size: 1Gi
  resources:
    requests:
      cpu: "0.1"
      memory: 64Mi
    limits:
      cpu: "1"
      memory: 256Mi

# -- Ingest worker (NATS consumer for async document processing)
ingestWorker:
  enabled: true
  image: localhost/graphrag-ingest-worker:v6
  replicas: 2
  maxRedeliveries: "3"
  ackWaitSeconds: "600"
  batchSize: "20"
  resources:
    requests:
      cpu: "0.25"
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

# -- Ingestion Management UI (React SPA + nginx)
ingestionUi:
  enabled: true
  image: localhost/graphrag-ingestion-ui:v4
  port: 8080
  nodePort: 31300
  resources:
    requests:
      cpu: "0.1"
      memory: 64Mi
    limits:
      cpu: "0.5"
      memory: 128Mi

# -- Queue-depth auto-scaler (NATS → reranker burst mode)
queueScaler:
  enabled: true
  image: localhost/graphrag-queue-scaler:latest
  pollInterval: "15"
  burstThreshold: "10"
  hysteresisUp: "3"
  hysteresisDown: "5"
  rerankerDeployment: "cpu-rerank"
  rerankerNormalReplicas: 1
  rerankerBurstReplicas: 1
  resources:
    requests:
      cpu: "0.1"
      memory: 64Mi
    limits:
      cpu: "0.5"
      memory: 128Mi

# -- Authentication (OIDC + API keys)
auth:
  enabled: false
  googleClientId: ""
  googleClientSecret: ""
  sessionSecret: "change-me-in-prod"
  redirectUri: ""              # e.g. http://192.168.1.100:31300/api/auth/callback
  allowedDomain: ""            # e.g. "company.com" (empty = any Gmail)
  sessionTtlSeconds: "86400"

nodeSelector:
  kubernetes.io/arch: arm64
