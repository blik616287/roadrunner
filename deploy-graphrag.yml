---
- name: Deploy GraphRAG stack on Kubernetes
  hosts: k8s
  become: true
  vars:
    local_user: "{{ ansible_env.SUDO_USER | default('b') }}"
    kubeconfig: "/home/{{ ansible_env.SUDO_USER | default('b') }}/.kube/config"
    chart_dir: "{{ playbook_dir }}/charts/graphrag"
    apps_dir: "{{ playbook_dir }}/apps"

  environment:
    KUBECONFIG: "{{ kubeconfig }}"

  tasks:
    # ── Build container images (nerdctl + buildkit → containerd k8s.io) ─
    - name: Check if code-preprocessor image exists in containerd
      shell: nerdctl --namespace k8s.io images -q --filter reference=localhost/graphrag-code-preprocessor | grep -q .
      register: preprocessor_image_check
      failed_when: false
      changed_when: false

    - name: Build code-preprocessor image
      shell: nerdctl --namespace k8s.io build -t localhost/graphrag-code-preprocessor:latest {{ apps_dir }}/code-preprocessor/
      when: preprocessor_image_check.rc != 0
      timeout: 600

    - name: Check if lightrag image exists in containerd
      shell: nerdctl --namespace k8s.io images -q --filter reference=localhost/graphrag-lightrag | grep -q .
      register: lightrag_image_check
      failed_when: false
      changed_when: false

    - name: Build lightrag image
      shell: nerdctl --namespace k8s.io build -t localhost/graphrag-lightrag:v2 {{ apps_dir }}/lightrag/
      when: lightrag_image_check.rc != 0
      timeout: 900

    # ── Build orchestrator image ─────────────────────────────────
    - name: Check if orchestrator image exists in containerd
      shell: nerdctl --namespace k8s.io images -q --filter reference=localhost/graphrag-orchestrator | grep -q .
      register: orchestrator_image_check
      failed_when: false
      changed_when: false

    - name: Build orchestrator image
      shell: nerdctl --namespace k8s.io build -t localhost/graphrag-orchestrator:latest {{ apps_dir }}/orchestrator/
      when: orchestrator_image_check.rc != 0
      timeout: 600

    # ── Build ingest-worker image ──────────────────────────────────
    - name: Check if ingest-worker image exists in containerd
      shell: nerdctl --namespace k8s.io images -q --filter reference=localhost/graphrag-ingest-worker | grep -q .
      register: ingest_worker_image_check
      failed_when: false
      changed_when: false

    - name: Build ingest-worker image
      shell: nerdctl --namespace k8s.io build -t localhost/graphrag-ingest-worker:latest {{ apps_dir }}/ingest-worker/
      when: ingest_worker_image_check.rc != 0
      timeout: 600

    # ── Build ingestion-ui image ──────────────────────────────────
    - name: Check if ingestion-ui image exists in containerd
      shell: nerdctl --namespace k8s.io images -q --filter reference=localhost/graphrag-ingestion-ui | grep -q .
      register: ingestion_ui_image_check
      failed_when: false
      changed_when: false

    - name: Build ingestion-ui image
      shell: nerdctl --namespace k8s.io build -t localhost/graphrag-ingestion-ui:latest {{ apps_dir }}/ingestion-ui/
      when: ingestion_ui_image_check.rc != 0
      timeout: 600

    # ── Build cpu-query image ──────────────────────────────────
    - name: Check if cpu-query image exists in containerd
      shell: nerdctl --namespace k8s.io images -q --filter reference=localhost/graphrag-cpu-query | grep -q .
      register: cpu_query_image_check
      failed_when: false
      changed_when: false

    - name: Build cpu-query image
      shell: nerdctl --namespace k8s.io build -t localhost/graphrag-cpu-query:latest {{ apps_dir }}/cpu-query/
      when: cpu_query_image_check.rc != 0
      timeout: 900

    # ── Build cpu-rerank image ──────────────────────────────────
    - name: Check if cpu-rerank image exists in containerd
      shell: nerdctl --namespace k8s.io images -q --filter reference=localhost/graphrag-cpu-rerank | grep -q .
      register: cpu_rerank_image_check
      failed_when: false
      changed_when: false

    - name: Build cpu-rerank image
      shell: nerdctl --namespace k8s.io build -t localhost/graphrag-cpu-rerank:latest {{ apps_dir }}/cpu-rerank/
      when: cpu_rerank_image_check.rc != 0
      timeout: 900

    # ── Build queue-scaler image ──────────────────────────────────
    - name: Check if queue-scaler image exists in containerd
      shell: nerdctl --namespace k8s.io images -q --filter reference=localhost/graphrag-queue-scaler | grep -q .
      register: queue_scaler_image_check
      failed_when: false
      changed_when: false

    - name: Build queue-scaler image
      shell: nerdctl --namespace k8s.io build -t localhost/graphrag-queue-scaler:latest {{ apps_dir }}/queue-scaler/
      when: queue_scaler_image_check.rc != 0
      timeout: 300

    # ── Deploy Helm chart ──────────────────────────────────────────
    - name: Clean up stuck Helm release if needed
      become: true
      become_user: "{{ local_user }}"
      shell: |
        status=$(helm status graphrag -n graphrag -o json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['status'])" 2>/dev/null || echo "absent")
        if [ "$status" = "pending-install" ] || [ "$status" = "failed" ]; then
          helm uninstall graphrag -n graphrag 2>/dev/null || true
          echo "cleaned"
        else
          echo "ok"
        fi
      register: helm_cleanup
      changed_when: "'cleaned' in helm_cleanup.stdout"

    - name: Deploy graphrag Helm chart
      become: true
      become_user: "{{ local_user }}"
      shell: |
        helm upgrade --install graphrag {{ chart_dir }} \
          --namespace graphrag \
          --create-namespace \
          --set extraction.model={{ models.extract.tag }} \
          --set extraction.servedModelName={{ models.extract.served_model_name }} \
          --set extraction.maxModelLen={{ models.extract.num_ctx }} \
          {% if models.extract.source == 'gguf' %}
          --set extraction.modelPath="/data/{{ models.extract.gguf_file }}" \
          --set extraction.tokenizer="/data/tokenizer" \
          --set extraction.dtype="half" \
          {% endif %}
          --set embedding.model={{ models.embed.tag }} \
          --set embedding.mode={{ models.embed.mode | default('dedicated') }} \
          --set lightrag.llm.model={{ models.extract.served_model_name }} \
          --set lightrag.llm.numCtx={{ models.extract.num_ctx }} \
          --set lightrag.embeddingConfig.model={{ models.embed.tag }} \
          --set reranker.model={{ models.reranker.tag }} \
          --set lightrag.rerank.model={{ models.reranker.tag }} \
          --set ingestWorker.replicas={{ graphrag.ingest_worker_replicas }} \
          --set codePreprocessor.replicas={{ graphrag.code_preprocessor_replicas }} \
          --set queueScaler.pollInterval={{ graphrag.queue_scaler.poll_interval }} \
          --set queueScaler.burstThreshold={{ graphrag.queue_scaler.burst_threshold }} \
          --set queueScaler.hysteresisUp={{ graphrag.queue_scaler.burst_hysteresis_up }} \
          --set queueScaler.hysteresisDown={{ graphrag.queue_scaler.burst_hysteresis_down }} \
          {% if auth is defined and auth.enabled | default(false) | bool %}
          --set auth.enabled=true \
          --set auth.googleClientId={{ auth.google_client_id }} \
          --set auth.googleClientSecret={{ auth.google_client_secret }} \
          --set auth.sessionSecret={{ auth.session_secret }} \
          --set auth.redirectUri={{ auth.redirect_uri }} \
          --set auth.allowedDomain={{ auth.allowed_domain | default('') }} \
          {% endif %}
          --timeout 15m
      register: chart_install

    - name: Show Helm install result
      debug:
        msg: "{{ chart_install.stdout_lines }}"

    # ── Wait for infrastructure pods (no GPU) ────────────────────
    - name: Wait for infrastructure pods
      become: true
      become_user: "{{ local_user }}"
      shell: |
        kubectl -n graphrag wait --for=condition=Ready pod -l app={{ item }} --timeout=120s
      loop:
        - neo4j
        - postgresql
        - redis
        - nats
      retries: 3
      delay: 10
      register: infra_ready
      until: infra_ready.rc == 0

    # ── Sequential vLLM startup (largest first to stabilize memory) ──
    #
    # On unified memory (GB10), all vLLM instances pre-allocate from the
    # same 119 GiB pool. Starting them simultaneously causes race conditions
    # where smaller models see negative available KV cache and crash.
    # Solution: start the largest consumer first, wait for it to settle,
    # then proceed to the next.

    - name: Scale down GPU vLLM deployments
      become: true
      become_user: "{{ local_user }}"
      shell: |
        kubectl -n graphrag scale deploy/vllm-extract --replicas=0 2>/dev/null || true
        kubectl -n graphrag scale deploy/vllm-embed --replicas=0 2>/dev/null || true
        kubectl -n graphrag scale deploy/vllm-query --replicas=0 2>/dev/null || true
        kubectl -n graphrag scale deploy/vllm-rerank --replicas=0 2>/dev/null || true
        sleep 5

    - name: "Start vllm-extract (largest GPU allocation, start first)"
      become: true
      become_user: "{{ local_user }}"
      shell: kubectl -n graphrag scale deploy/vllm-extract --replicas=1

    - name: Wait for vllm-extract to be ready
      become: true
      become_user: "{{ local_user }}"
      shell: kubectl -n graphrag wait --for=condition=Ready pod -l app=vllm-extract --timeout=600s
      retries: 2
      delay: 15
      register: extract_ready
      until: extract_ready.rc == 0

    - name: "Start vllm-embed (small GPU allocation)"
      become: true
      become_user: "{{ local_user }}"
      shell: kubectl -n graphrag scale deploy/vllm-embed --replicas=1

    - name: Wait for vllm-embed to be ready
      become: true
      become_user: "{{ local_user }}"
      shell: kubectl -n graphrag wait --for=condition=Ready pod -l app=vllm-embed --timeout=300s
      retries: 3
      delay: 15
      register: embed_ready
      until: embed_ready.rc == 0

    # ── Wait for application pods ────────────────────────────────
    - name: Wait for application pods
      become: true
      become_user: "{{ local_user }}"
      shell: |
        kubectl -n graphrag wait --for=condition=Ready pod -l app={{ item }} --timeout=300s
      loop:
        - cpu-query
        - cpu-rerank
        - lightrag
        - code-preprocessor
        - orchestrator
        - ingest-worker
        - ingestion-ui
        - queue-scaler
      retries: 3
      delay: 10
      register: app_ready
      until: app_ready.rc == 0

    # ── Enable pgvector extension ──────────────────────────────────
    - name: Enable pgvector extension in PostgreSQL
      become: true
      become_user: "{{ local_user }}"
      shell: |
        kubectl -n graphrag exec deploy/postgresql -- \
          psql -U lightrag -d lightrag -c "CREATE EXTENSION IF NOT EXISTS vector;"
      register: pgvector_ext
      changed_when: "'CREATE EXTENSION' in pgvector_ext.stdout"

    # ── Show status ────────────────────────────────────────────────
    - name: Show deployment status
      become: true
      become_user: "{{ local_user }}"
      shell: |
        echo "=== GraphRAG Pods ==="
        kubectl get pods -n graphrag -o wide
        echo ""
        echo "=== GraphRAG Services ==="
        kubectl get svc -n graphrag
        echo ""
        echo "=== vLLM Memory Allocation ==="
        for d in vllm-extract vllm-query vllm-embed vllm-rerank; do
          kv=$(kubectl -n graphrag logs deploy/$d 2>/dev/null | grep "KV cache memory" | tail -1 | awk '{print $NF, $(NF-1)}')
          echo "  $d: KV cache $kv"
        done
        echo ""
        echo "=== System Memory ==="
        free -h | head -2
        echo ""
        echo "=== Endpoints ==="
        echo "Ingestion UI:         http://localhost:31300"
        echo "GraphRAG Orchestrator: http://localhost:31800"
        echo "LightRAG API:         http://localhost:31436"
        echo "Neo4j Browser:        http://localhost:31474"
        echo "Code Preprocessor:    http://localhost:31490"
      register: status

    - name: Display status
      debug:
        var: status.stdout_lines
